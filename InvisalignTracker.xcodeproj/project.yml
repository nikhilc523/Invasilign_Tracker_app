name: InvisalignTracker
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  SWIFT_VERSION: "5.9"

packages:
  # Add any SPM dependencies here if needed

targets:
  # iOS App
  InvisalignTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: InvisalignTracker
    dependencies:
      - target: InvisalignTrackerWatch
    settings:
      INFOPLIST_FILE: InvisalignTracker/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.InvisalignTracker
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: "" # Your team ID
    attributes:
      DevelopmentTeam: "" # Your team ID

  # watchOS App
  InvisalignTrackerWatch:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: InvisalignTrackerWatch
    dependencies:
      - target: InvisalignTrackerWatchWidget
    settings:
      INFOPLIST_FILE: InvisalignTrackerWatch/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.InvisalignTracker.watchkitapp
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: "" # Your team ID
      TARGETED_DEVICE_FAMILY: "4"
      WATCHOS_DEPLOYMENT_TARGET: "10.0"
      SKIP_INSTALL: NO
    attributes:
      DevelopmentTeam: "" # Your team ID

  # Watch Widget Extension for Complications
  InvisalignTrackerWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: InvisalignTrackerWatchWidget
    settings:
      INFOPLIST_FILE: InvisalignTrackerWatchWidget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.InvisalignTracker.watchkitapp.widget
      DEVELOPMENT_TEAM: "" # Your team ID
      TARGETED_DEVICE_FAMILY: "4"
    attributes:
      DevelopmentTeam: "" # Your team ID
