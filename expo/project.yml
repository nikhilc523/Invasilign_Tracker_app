name: InvisalignTracker
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.InvisalignTracker
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
packages: {}
targets:
  InvisalignTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - Tests
          - LiveActivitiesExtension
          - InvisalignTracker.xcodeproj
          - InvisalignTrackerWatch
          - InvisalignTrackerWatchWidget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        CODE_SIGN_ENTITLEMENTS: App/InvisalignTracker.entitlements
    dependencies:
      - target: InvisalignTrackerWatch
        embed: true
      - target: InvisalignTrackerLiveActivities
        embed: true
    scheme:
      testTargets:
        - InvisalignTrackerTests

  InvisalignTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests
    dependencies:
      - target: InvisalignTracker

  InvisalignTrackerLiveActivities:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LiveActivitiesExtension
      - path: Shared/LiveActivities/AlignerLiveActivityAttributes.swift
      - path: Shared/Theme/AppTheme.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.InvisalignTracker.LiveActivities
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: LiveActivitiesExtension/Info.plist

  InvisalignTrackerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: InvisalignTrackerWatch
      - path: WatchStatePayload.swift
    dependencies:
      - target: InvisalignTrackerWatchWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.InvisalignTracker.watchkitapp
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: InvisalignTrackerWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: NO
        CODE_SIGN_ENTITLEMENTS: InvisalignTrackerWatch/InvisalignTrackerWatch.entitlements
    scheme: {}

  InvisalignTrackerWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: InvisalignTrackerWatchWidget/AlignerWidget.swift
      - path: InvisalignTrackerWatchWidget/WidgetDataStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.InvisalignTracker.watchkitapp.widget
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: InvisalignTrackerWatchWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: InvisalignTrackerWatchWidget/InvisalignTrackerWatchWidget.entitlements
